name: Workflow CI - Train MLflow Model

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  MLFLOW_TRACKING_URI: file:${{ github.workspace }}/mlruns
  DOCKER_IMAGE_NAME: riskiputraalamzah/smsml-breast-cancer

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Hub secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "DOCKERHUB_USERNAME secret belum diatur."
            exit 1
          fi

          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "DOCKERHUB_TOKEN secret belum diatur."
            exit 1
          fi

          echo "Docker Hub secrets tersedia."

      - name: Show Docker information
        run: |
          docker --version
          docker info

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r MLProject/requirements.txt

      - name: Run MLflow Project
        run: |
          mlflow run MLProject --env-manager=local --experiment-name SMSML_Workflow_CI_Riski_Alamzah

      - name: Show MLflow runs
        run: |
          python - <<'PY'
          import os
          import mlflow
          from mlflow.tracking import MlflowClient

          tracking_uri = os.environ["MLFLOW_TRACKING_URI"]
          mlflow.set_tracking_uri(tracking_uri)

          client = MlflowClient()
          experiment = client.get_experiment_by_name("SMSML_Workflow_CI_Riski_Alamzah")

          if experiment is None:
              raise RuntimeError("Experiment tidak ditemukan.")

          runs = client.search_runs(
              experiment_ids=[experiment.experiment_id],
              order_by=["attributes.start_time DESC"],
              max_results=5
          )

          print(f"Experiment ID: {experiment.experiment_id}")

          for run in runs:
              print("Run ID:", run.info.run_id)
              print("Status:", run.info.status)
              print("Metrics:", run.data.metrics)
          PY

      - name: Get latest run ID
        run: |
          if [ ! -f MLProject/artifacts/run_id.txt ]; then
            echo "File MLProject/artifacts/run_id.txt tidak ditemukan."
            exit 1
          fi

          RUN_ID=$(cat MLProject/artifacts/run_id.txt)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run ID: $RUN_ID"

      - name: Build Docker image with MLflow
        run: |
          echo "Building Docker image: ${DOCKER_IMAGE_NAME}:${GITHUB_SHA}"

          mlflow models build-docker \
            -m "runs:/${RUN_ID}/model" \
            -n "${DOCKER_IMAGE_NAME}:${GITHUB_SHA}" \
            --env-manager=local

          docker tag "${DOCKER_IMAGE_NAME}:${GITHUB_SHA}" "${DOCKER_IMAGE_NAME}:latest"

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
            --username "${{ secrets.DOCKERHUB_USERNAME }}" \
            --password-stdin

      - name: Push Docker image to Docker Hub
        run: |
          docker push "${DOCKER_IMAGE_NAME}:${GITHUB_SHA}"
          docker push "${DOCKER_IMAGE_NAME}:latest"

      - name: Save Docker Hub image information
        run: |
          mkdir -p docker_info
          echo "Docker Hub image:" > docker_info/docker_hub_image.txt
          echo "https://hub.docker.com/r/riskiputraalamzah/smsml-breast-cancer" >> docker_info/docker_hub_image.txt
          echo "" >> docker_info/docker_hub_image.txt
          echo "Image tags:" >> docker_info/docker_hub_image.txt
          echo "${DOCKER_IMAGE_NAME}:${GITHUB_SHA}" >> docker_info/docker_hub_image.txt
          echo "${DOCKER_IMAGE_NAME}:latest" >> docker_info/docker_hub_image.txt

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-training-artifacts
          path: |
            mlruns
            MLProject/artifacts
            docker_info
