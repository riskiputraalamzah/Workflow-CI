name: Workflow CI - Train MLflow Model

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  MLFLOW_TRACKING_URI: file:${{ github.workspace }}/mlruns

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r MLProject/requirements.txt

      - name: Run MLflow Project
        run: |
          mlflow run MLProject --env-manager=local --experiment-name SMSML_Workflow_CI_Riski_Alamzah

      - name: Show MLflow runs
        run: |
          python - <<'PY'
          import os
          import mlflow
          from mlflow.tracking import MlflowClient

          tracking_uri = os.environ["MLFLOW_TRACKING_URI"]
          mlflow.set_tracking_uri(tracking_uri)

          client = MlflowClient()
          experiment = client.get_experiment_by_name("SMSML_Workflow_CI_Riski_Alamzah")

          if experiment is None:
              raise RuntimeError("Experiment tidak ditemukan.")

          runs = client.search_runs(
              experiment_ids=[experiment.experiment_id],
              order_by=["attributes.start_time DESC"],
              max_results=5
          )

          print(f"Experiment ID: {experiment.experiment_id}")
          for run in runs:
              print("Run ID:", run.info.run_id)
              print("Status:", run.info.status)
              print("Metrics:", run.data.metrics)
          PY

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-training-artifacts
          path: |
            mlruns
            MLProject/artifacts
